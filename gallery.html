<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | NARUTO Fan Log</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background-color: #994d00;
      color: #eee;
    }

    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    nav a {
      margin: 0 10px;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: #fff;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .item {
      background-color: #663300;
      padding: 10px;
      border-radius: 5px;
    }

    .item img {
      width: 100%;
      border-radius: 5px;
    }

    .caption {
      margin-top: 8px;
      font-size: 13px;
      color: #aaa;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #333;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

  <header>
    <h1>GALLERY</h1>
    <nav>
      <a href="index.html">HOME</a>
      <a href="blog.html">BLOG</a>
      <a href="about.html">ABOUT</a>
    </nav>
  </header>

  <div class="container">
    <div class="gallery">

      <div class="item">
        <img src="img1.jpg" alt="">
        <div class="caption">このシーン好きすぎて描いた</div>
      </div>

      <div class="item">
        <img src="img2.jpg" alt="">
        <div class="caption">表情が良すぎる</div>
      </div>

      <div class="item">
        <img src="img3.jpg" alt="">
        <div class="caption">なんとなく描いたけど気に入ってる</div>
      </div>

    </div>
  </div>

  <footer>
    <p>© Fan Log</p>
  </footer>

</body>
</html>
